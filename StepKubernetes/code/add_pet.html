<!DOCTYPE html>
<html>
<head><title>Add Pet</title></head>
<body>
    <h1>Add a new Pet</h1>
    {% if success %}<p style="color:green">{{ success }}</p>{% endif %}
    <form method="post">
        Name: <input type="text" name="name"><br>
        Price: <input type="number" name="price"><br>
        <input type="submit" value="Add">
    </form>
    <a href="/">Back to home</a>
</body>
</html>
